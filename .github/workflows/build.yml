name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: 'Build (${{ matrix.name }})'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-i386
            makefile: Makefile.lin32
            binary: c--
          - name: windows-i386
            makefile: Makefile.win32
            binary: c--.exe

    steps:
      - uses: actions/checkout@v7

      - name: Install the Windows cross compiler
        if: matrix.name == 'windows-i386'
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-i686

      - name: Install the Linux multilib
        if: matrix.name == 'linux-i386'
        run: sudo apt-get update && sudo apt-get install -y g++-multilib

      - name: Build
        run: make -f ${{ matrix.makefile }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.binary }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: linux-i386

      - uses: actions/download-artifact@v7
        with:
          name: windows-i386

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            c--
            c--.exe
          generate_release_notes: true
