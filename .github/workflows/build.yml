name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >
            mingw-w64-i686-gcc

      - name: Build
        run: |
          g++ -w -fpermissive -fno-exceptions -D_WIN32_ -D__CONSOLE__ -static -o cmm.exe *.cpp

      - uses: actions/upload-artifact@v4
        with:
          name: cmm.exe
          path: cmm.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cmm.exe

      - uses: softprops/action-gh-release@v2
        with:
          files: cmm.exe
          generate_release_notes: true
